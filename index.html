let questions = questionPool.sort(()=>Math.random()-0.5).slice(0,30)

if(!loadExamState()){
questions = questionPool.sort(()=>Math.random()-0.5).slice(0,30)
}

function loadQuestion(){

let q=questions[current]

document.getElementById("question").innerText=(current+1)+". "+q.q

let html=""

for(let i=0;i<q.o.length;i++){

html+=`<div class="option" onclick="selectOption(${i})">${q.o[i]}</div>`

}

document.getElementById("options").innerHTML=html

selected=null

}

function selectOption(i){

    selected=i

    let opts=document.querySelectorAll(".option")

    opts.forEach(o=>o.classList.remove("selected"))

    opts[i].classList.add("selected")

}

function nextQuestion(){

    if(selected===null){
    alert("Válassz egy választ mielőtt továbblépsz!")
    return
    }

    answers[current]=selected

    if(selected===questions[current].a){
    score++
    }

    current++

    if(current>=questions.length){
    finishTest()
    return
    }

    loadQuestion()

}

function finishTest(){

    clearInterval(timer)

    document.getElementById("timer").style.display="none"

    let percent=Math.round((score/questions.length)*100)

    let status=percent>=70?"SIKERES ✅":"SIKERTELEN ❌"

    document.getElementById("quiz").style.display="none"
    document.getElementById("result").style.display="block"

    document.getElementById("result").innerHTML=
    "Eredmény: "+score+" / "+questions.length+
    "<br><br>Százalék: "+percent+"%"+
    "<br><br>Vizsga: "+status+
    "<br><br><button onclick='startReview()'>Kérdések áttekintése</button>"

    }

    let reviewIndex=0

    function startReview(){

    document.getElementById("result").style.display="none"
    document.getElementById("quiz").style.display="block"

    reviewIndex=0

    showReview()

}

function showReview(){

let q=questions[reviewIndex]

document.getElementById("question").innerText=(reviewIndex+1)+". "+q.q

let html=""

for(let i=0;i<q.o.length;i++){

let style=""

if(i===q.a){
style="background:#22c55e;color:black"
}

if(i===answers[reviewIndex] && i!==q.a){
style="background:#ef4444"
}

html+=`<div class="option" style="${style}">${q.o[i]}</div>`

}

html+=`<button onclick="nextReview()">Következő kérdés</button>`

document.getElementById("options").innerHTML=html

}

function nextReview(){

reviewIndex++

if(reviewIndex>=questions.length){

document.getElementById("question").innerText="Áttekintés vége"
document.getElementById("options").innerHTML=""

return
}

showReview()

}

    loadQuestion()

    let s=time%60

    document.getElementById("timer").innerText="Idő: "+m+":"+(s<10?"0":"")+s

    time--

    if(time<=0){

    clearInterval(timer)

    finishTest()

    }

},1000)
