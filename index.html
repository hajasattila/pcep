<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>PCEP Gyakorló Teszt</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:750px;
background:#020617;
padding:30px;
border-radius:10px;
}

h1{
text-align:center;
margin-bottom:20px;
}

#timer{
text-align:right;
color:#38bdf8;
margin-bottom:15px;
font-size:18px;
}

.question{
font-size:20px;
margin-bottom:20px;
}

.option{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
cursor:pointer;
}

.option:hover{
background:#334155;
}

.selected{
background:#38bdf8;
color:black;
}

button{
margin-top:15px;
padding:10px 20px;
background:#38bdf8;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

#result{
text-align:center;
font-size:22px;
}

</style>
</head>

<body>

<div class="container">

<h1>PCEP Gyakorló Teszt</h1>

<div id="timer"></div>

<div id="quiz">

<div id="question" class="question"></div>

<div id="options"></div>

<button onclick="nextQuestion()">Következő</button>

</div>

<div id="result" style="display:none;"></div>

</div>

{q:"Mi a kimenet? print(20//6)",o:["3","3.3","4","2"],a:0},

{q:"Mi a kimenet? print(4*4)",o:["8","16","12","4"],a:1},
{q:"Mi a kimenet? print(3+7)",o:["9","10","11","12"],a:1},
{q:"Mi a kimenet? print(12//5)",o:["2","2.4","3","1"],a:0},
{q:"Mi a kimenet? print(6%4)",o:["1","2","3","0"],a:1},

{q:"Mi a kimenet? x=[1,2,3]; x.append(x[-1]); print(x)",o:["[1,2,3]","[1,2,3,3]","[1,2,3,1]","hiba"],a:1},

{q:"Mi a kimenet? nums=[5,3,8]; nums.sort(); print(nums)",o:["[5,3,8]","[3,5,8]","[8,5,3]","hiba"],a:1},

{q:"Mi a kimenet? print(bool([]))",o:["True","False","[]","hiba"],a:1},

{q:"Mi a kimenet? x=2; x*=3+1; print(x)",o:["8","6","12","4"],a:0},

{q:"Mi a kimenet? print(3 in [1,2,3,4])",o:["True","False","3","hiba"],a:0},

{q:"Mi a kimenet? x=[1,2,3]; x.pop(); print(x)",o:["[1,2]","[2,3]","[1,2,3]","[3]"],a:0},

{q:"Mi a kimenet? text='AI'; print(text*2)",o:["AIAI","AI AI","AI2","hiba"],a:0},

{q:"Mi a kimenet? x=10; if x>5: print('A'); else: print('B')",o:["A","B","semmi","hiba"],a:0}

]

let questions = questionPool.sort(()=>Math.random()-0.5).slice(0,30)

let current=0
let score=0
let selected=null

function loadQuestion(){

let q=questions[current]

document.getElementById("question").innerText=(current+1)+". "+q.q

let html=""

for(let i=0;i<q.o.length;i++){

html+=`<div class="option" onclick="selectOption(${i})">${q.o[i]}</div>`

}

document.getElementById("options").innerHTML=html

selected=null

}

function selectOption(i){

selected=i

let opts=document.querySelectorAll(".option")

opts.forEach(o=>o.classList.remove("selected"))

opts[i].classList.add("selected")

}

function nextQuestion(){

if(selected===questions[current].a) score++

current++

if(current>=questions.length){

document.getElementById("quiz").style.display="none"

document.getElementById("result").style.display="block"

let percent = Math.round((score/questions.length)*100)

let status = percent >= 70 ? "SIKERES ✅" : "SIKERTELEN ❌"

document.getElementById("result").innerHTML=
"Eredmény: "+score+" / "+questions.length+
"<br><br>Százalék: "+percent+"%"+
"<br><br>Vizsga: "+status

return
}

loadQuestion()

}

loadQuestion()

let time=45*60

let timer=setInterval(()=>{

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText="Idő: "+m+":"+(s<10?"0":"")+s

time--

if(time<=0){

clearInterval(timer)

document.getElementById("quiz").style.display="none"

document.getElementById("result").style.display="block"

let percent = Math.round((score/questions.length)*100)

let status = percent >= 70 ? "SIKERES ✅" : "SIKERTELEN ❌"

document.getElementById("result").innerHTML=
"Lejárt az idő!<br><br>"+
"Eredmény: "+score+" / "+questions.length+
"<br><br>Százalék: "+percent+"%"+
"<br><br>Vizsga: "+status
}

},1000)

</script>

</body>
</html>
